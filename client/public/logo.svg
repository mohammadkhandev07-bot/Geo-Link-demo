<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main gradient - Blue to Pink -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="30%" stop-color="#0099FF"/>
      <stop offset="60%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    
    <!-- Orbit gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#FF006E"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 3D shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0A0A0A"/>
  
  <!-- Main A shape with 3D effect -->
  <path d="M50 12 L85 78 H72 L62 52 H38 L28 78 H15 L50 12 Z" 
        fill="url(#mainGrad)" 
        filter="url(#shadow)"/>
  
  <!-- Inner triangle cutout -->
  <path d="M50 32 L56 48 H44 L50 32 Z" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Orbit ring -->
  <ellipse cx="50" cy="58" rx="38" ry="10" 
           fill="none" 
           stroke="url(#orbitGrad)" 
           stroke-width="3" 
           stroke-linecap="round"
           transform="rotate(-20 50 58)"
           filter="url(#glow)"/>
  
  <!-- Center highlight dot -->
  <circle cx="50" cy="52" r="2.5" fill="white" opacity="0.9"/>
</svg>
