<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="o" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="s">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main A -->
  <path d="M50 8 L88 82 H70 L62 64 H38 L30 82 H12 L50 8Z" 
        fill="url(#g)" stroke="white" stroke-width="1.5" filter="url(#s)"/>
  
  <!-- Inner triangle -->
  <path d="M50 32 L58 52 H42 L50 32Z" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Orbit -->
  <ellipse cx="50" cy="52" rx="42" ry="14" fill="none" stroke="url(#o)" 
           stroke-width="3" stroke-linecap="round" transform="rotate(-25 50 52)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="52" r="3" fill="white"/>
</svg>
