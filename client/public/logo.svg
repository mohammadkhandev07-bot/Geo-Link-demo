<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main Gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    
    <!-- Orbit Gradient -->
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (optional, for favicon) -->
  <circle cx="50" cy="50" r="48" fill="#0F172A"/>
  
  <!-- Main A Shape -->
  <path d="M50 15 L80 75 H65 L58 58 H42 L35 75 H20 L50 15 Z" 
        fill="url(#mainGradient)" 
        stroke="white" 
        stroke-width="1.5"
        filter="url(#glow)"/>
  
  <!-- Inner Triangle (cutout effect) -->
  <path d="M50 35 L55 50 H45 L50 35 Z" 
        fill="rgba(255,255,255,0.3)"/>
  
  <!-- Orbit Swoosh -->
  <ellipse cx="50" cy="55" rx="38" ry="12" 
           fill="none" 
           stroke="url(#orbitGradient)" 
           stroke-width="3" 
           stroke-linecap="round"
           transform="rotate(-25 50 55)"/>
  
  <!-- Geo Location Pin -->
  <circle cx="50" cy="50" r="3" fill="white"/>
  
  <!-- Small decorative dots (stars) -->
  <circle cx="15" cy="25" r="1.5" fill="#60A5FA" opacity="0.8"/>
  <circle cx="85" cy="30" r="1" fill="#F472B6" opacity="0.6"/>
  <circle cx="20" cy="70" r="1" fill="#A78BFA" opacity="0.7"/>
</svg>
