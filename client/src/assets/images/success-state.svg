<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="150" r="120" fill="#1E293B"/>
  
  <!-- Checkmark -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="url(#successGrad)" stroke-width="8"/>
  <polyline points="170,150 190,170 230,130" fill="none" stroke="url(#successGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Confetti -->
  <rect x="100" y="80" width="8" height="8" fill="#3B82F6" transform="rotate(45 104 84)"/>
  <rect x="300" y="100" width="6" height="6" fill="#EC4899" transform="rotate(30 303 103)"/>
  <rect x="120" y="220" width="10" height="10" fill="#8B5CF6" transform="rotate(60 125 225)"/>
  <rect x="280" y="200" width="7" height="7" fill="#F59E0B" transform="rotate(20 283 203)"/>
</svg>
