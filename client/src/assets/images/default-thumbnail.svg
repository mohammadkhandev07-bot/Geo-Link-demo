<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="thumbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#thumbGrad)"/>
  
  <!-- Decorative Circles -->
  <circle cx="200" cy="200" r="150" fill="url(#accentGrad)" opacity="0.1"/>
  <circle cx="1080" cy="520" r="200" fill="url(#accentGrad)" opacity="0.1"/>
  
  <!-- Play Button -->
  <circle cx="640" cy="360" r="80" fill="url(#accentGrad)" opacity="0.9"/>
  <polygon points="620,330 620,390 670,360" fill="white"/>
  
  <!-- GeoLink Text -->
  <text x="640" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="url(#accentGrad)">GeoLink</text>
  <text x="640" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#94A3B8">Video</text>
</svg>
