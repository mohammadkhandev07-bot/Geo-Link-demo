<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="150" r="120" fill="#1E293B"/>
  
  <!-- Magnifying Glass -->
  <circle cx="180" cy="130" r="50" fill="none" stroke="url(#emptyGrad)" stroke-width="8"/>
  <line x1="220" y1="170" x2="260" y2="210" stroke="url(#emptyGrad)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Question Marks -->
  <text x="150" y="110" font-size="30" fill="#64748B" opacity="0.5">?</text>
  <text x="210" y="100" font-size="20" fill="#64748B" opacity="0.3">?</text>
  <text x="170" y="180" font-size="25" fill="#64748B" opacity="0.4">?</text>
  
  <!-- Decorative Dots -->
  <circle cx="100" cy="80" r="4" fill="#3B82F6" opacity="0.5"/>
  <circle cx="300" cy="200" r="6" fill="#EC4899" opacity="0.5"/>
  <circle cx="320" cy="100" r="3" fill="#8B5CF6" opacity="0.6"/>
</svg>
