<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <!-- Gradient -->
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="200" cy="150" r="120" fill="#0f172a"/>

  <!-- Outer Glow Ring -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="url(#gradRed)" stroke-width="3" opacity="0.3"/>

  <!-- Broken Circle -->
  <path d="M130 150 A70 70 0 0 1 270 150" stroke="url(#gradRed)" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M270 150 A70 70 0 0 1 130 150" stroke="url(#gradRed)" stroke-width="10" fill="none" stroke-dasharray="20 15" stroke-linecap="round"/>

  <!-- Cross Icon -->
  <line x1="170" y1="120" x2="230" y2="180" stroke="url(#gradRed)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="230" y1="120" x2="170" y2="180" stroke="url(#gradRed)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Small Floating Particles -->
  <circle cx="110" cy="90" r="4" fill="#ff4d4d" opacity="0.4"/>
  <circle cx="300" cy="210" r="3" fill="#ff4d4d" opacity="0.3"/>
  <circle cx="250" cy="80" r="2" fill="#ff4d4d" opacity="0.5"/>

</svg>
