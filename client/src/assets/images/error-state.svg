<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="150" r="120" fill="#1E293B"/>
  
  <!-- Broken Link/Chain -->
  <path d="M140 150 H180" stroke="url(#errorGrad)" stroke-width="12" stroke-linecap="round"/>
  <path d="M220 150 H260" stroke="url(#errorGrad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Lightning Bolt -->
  <polygon points="200,100 220,140 200,140 210,180 180,140 200,140" fill="url(#errorGrad)"/>
  
  <!-- X Marks -->
  <text x="120" y="100" font-size="40" fill="#EF4444" opacity="0.3">×</text>
  <text x="280" y="200" font-size="35" fill="#EF4444" opacity="0.4">×</text>
</svg>
