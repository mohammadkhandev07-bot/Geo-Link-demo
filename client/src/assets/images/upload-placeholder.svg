<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="uploadGradAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6">
        <animate attributeName="stop-color" values="#3B82F6;#8B5CF6;#EC4899;#3B82F6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6;#EC4899;#3B82F6;#8B5CF6" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2" stroke-dasharray="10 5">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <g transform="translate(200, 130)">
    <path d="M-20 10 L0 -10 L20 10" stroke="url(#uploadGradAnim)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <line x1="0" y1="-10" x2="0" y2="30" stroke="url(#uploadGradAnim)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <line x1="150" y1="180" x2="250" y2="180" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  
  <text x="200" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#94A3B8">Drag & drop or click to upload</text>
</svg>
