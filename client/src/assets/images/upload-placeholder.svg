<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="uploadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" rx="20" fill="#1E293B" stroke="#334155" stroke-width="2" stroke-dasharray="10 5"/>
  
  <!-- Upload Icon -->
  <g transform="translate(200, 130)">
    <path d="M-20 10 L0 -10 L20 10" stroke="url(#uploadGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="0" y1="-10" x2="0" y2="30" stroke="url(#uploadGrad)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Base Line -->
  <line x1="150" y1="180" x2="250" y2="180" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8">Drag &amp; drop or click to upload</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">Supports: MP4, MOV, JPG, PNG</text>
  
  <!-- Decorative Elements -->
  <circle cx="80" cy="80" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="320" cy="220" r="4" fill="#EC4899" opacity="0.5"/>
  <circle cx="340" cy="60" r="2" fill="#8B5CF6" opacity="0.6"/>
</svg>
